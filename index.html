<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet of the Month</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('image.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container { width: 90%; max-width: 1100px; text-align: center; padding: 50px 20px; }
        .main-title { font-family: 'Great Vibes', cursive; font-size: clamp(3rem, 10vw, 5rem); color: #ff6b81; margin-bottom: 40px; text-shadow: 2px 2px 10px white; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .month-box { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; padding: 40px 15px; font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .month-box:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.5); border-color: #ff6b81; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 85%; max-width: 450px; border-radius: 25px; text-align: center; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; color: #ff6b81; }
        #sweetImage { width: 100%; max-height: 280px; object-fit: cover; border-radius: 15px; margin: 15px 0; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">Sweet of the Month</h1>
        <div class="grid-container">
            <div class="month-box" onclick="openModal('January')">January</div>
            <div class="month-box" onclick="openModal('February')">February</div>
            <div class="month-box" onclick="openModal('March')">March</div>
            <div class="month-box" onclick="openModal('April')">April</div>
            <div class="month-box" onclick="openModal('May')">May</div>
            <div class="month-box" onclick="openModal('June')">June</div>
            <div class="month-box" onclick="openModal('July')">July</div>
            <div class="month-box" onclick="openModal('August')">August</div>
            <div class="month-box" onclick="openModal('September')">September</div>
            <div class="month-box" onclick="openModal('October')">October</div>
            <div class="month-box" onclick="openModal('November')">November</div>
            <div class="month-box" onclick="openModal('December')">December</div>
        </div>
        <div style="background: rgba(255,255,255,0.4); padding: 30px; border-radius: 25px;">
            <h2 style="font-family: 'Great Vibes'; color: #ff6b81; font-size: 2.5rem;">Our Sweet Memories</h2>
            <a href="https://github.com/almoughrabifares-pixel/mylove-sweet/issues/new" target="_blank" style="padding: 15px 30px; background: #ff6b81; color: white; text-decoration: none; border-radius: 50px; font-weight: bold;">Write a Note ✍️</a>
        </div>
    </div>

    <div id="sweetModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalMonth" style="color: #ff6b81; font-family: 'Great Vibes';"></h2>
            <h3 id="sweetName"></h3>
            <img id="sweetImage" src="" alt="Sweet Photo">
            <p id="sweetDesc"></p>
        </div>
    </div>

    <script>
        let sweetsData = {};
        fetch('data.json').then(res => res.json()).
                    then(data => sweetsData = data);
        function openModal(month) {
            const modal = document.getElementById('sweetModal');
            const data = sweetsData[month];
            document.getElementById('modalMonth').innerText = month;
            const img = document.getElementById('sweetImage');
            if(data) {
                document.getElementById('sweetName').innerText = data.name;
                document.getElementById('sweetDesc').innerText = data.desc;
                img.src = data.image; img.style.display = "block";
            } else {
                document.getElementById('sweetName').innerText = "Coming Soon...";
                document.getElementById('sweetDesc').innerText = "Wait for the surprise!";
                img.style.display = "none";
            }
            modal.style.display = "block";
        }
        function closeModal() { document.getElementById('sweetModal').style.display = "none"; }
    </script>
</body>
</html>
