<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet of the Month</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('image.png'); /* تأكد من رفع صورة القطة بهذا الاسم */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            color: #4a4a4a;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            text-align: center;
            padding: 60px 20px;
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 8vw, 5rem);
            color: #ff6b81;
            text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .month-box {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 45px 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .month-box:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.5);
            border-color: #ff6b81;
        }

        /* النافذة المنبثقة Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            width: 85%;
            max-width: 500px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close {
            position: absolute;
            right: 20px; top: 15px;
            font-size: 28px; cursor: pointer; color: #ff6b81;
        }

        #sweetImage {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 15px;
            margin: 15px 0;
            display: none;
        }

        .giscus-container {
            background: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">Sweet of the Month</h1>
        
        <div class="grid-container">
            <script>
                const months = ["January", "February", "March", "April", "May", "June", 
                                "July", "August", "September", "October", "November", "December"];
                months.forEach(m => {
                    document.write(`<div class="month-box" onclick="openModal('${m}')">${m}</div>`);
                });
            </script>
        </div>

        <div class="giscus-container">
            <h2 style="font-family: 'Great Vibes'; color: #ff6b81;">Our Sweet Notes</h2>
            <div class="giscus"></div>
        </div>
    </div>

    <div id="sweetModal" class="modal">
        <div class="modal-content">
          <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalMonth" style="color: #ff6b81; font-family: 'Great Vibes'; font-size: 2.5rem;"></h2>
            <h3 id="sweetName"></h3>
            <img id="sweetImage" src="" alt="Sweet Photo">
            <p id="sweetDesc"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
